<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ronda Gang Lilly</title>
  <style>
    :root {
      --bg:        #0d1b12;
      --bg2:       #132019;
      --card:      #1a2e20;
      --card2:     #1f3626;
      --border:    #2c4a34;
      --amber:     #e8a23a;
      --amber-dim: #a06b1a;
      --green:     #4caf72;
      --green-dim: #2a6642;
      --text:      #d6ead9;
      --text-dim:  #7da88a;
      --text-muted:#4a6e55;
      --moon:      #f5d88a;
      --red:       #d96b5b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 80px;
      font-size: 15px;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(160deg, #0a1610 0%, #132019 60%, #1a2e20 100%);
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .moon-wrap {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, var(--moon) 0%, #c8a44a 60%, #7a5e1a 100%);
      box-shadow: 0 0 18px 6px rgba(245,216,138,0.22), 0 0 40px 12px rgba(245,216,138,0.08);
      animation: moonpulse 4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes moonpulse {
      0%,100% { box-shadow: 0 0 18px 6px rgba(245,216,138,0.22), 0 0 40px 12px rgba(245,216,138,0.08); }
      50%      { box-shadow: 0 0 24px 10px rgba(245,216,138,0.34), 0 0 55px 18px rgba(245,216,138,0.14); }
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--moon);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .clock {
      margin-left: auto;
      text-align: right;
    }
    .clock-time {
      font-size: 19px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    .clock-date {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── SECTIONS ── */
    .screen { display: none; padding: 16px; }
    .screen.active { display: block; }

    /* ── TODAY BANNER ── */
    .today-banner {
      background: linear-gradient(135deg, #1e3d28 0%, #2a4d34 100%);
      border: 1px solid var(--green-dim);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .today-banner::before {
      content: '';
      position: absolute; top: -20px; right: -20px;
      width: 90px; height: 90px;
      background: radial-gradient(circle, rgba(76,175,114,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .today-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .today-group {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      margin-bottom: 2px;
    }
    .today-group span { color: var(--green); }
    .today-meta {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 6px;
      display: flex;
      gap: 14px;
    }
    .today-meta i { color: var(--amber); margin-right: 3px; }

    /* ── JAM RONDA ── */
    .jam-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .jam-card h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .jam-slots {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .jam-slot {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      text-align: center;
      flex: 1;
      min-width: 70px;
    }
    .jam-slot.active-now {
      border-color: var(--amber);
      background: rgba(232,162,58,0.08);
    }
    .jam-time { font-size: 15px; font-weight: 700; color: var(--amber); font-variant-numeric: tabular-nums; }
    .jam-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ── ANGGOTA CHECKLIST ── */
    .member-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .member-card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .member-card-header h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .hadir-count {
      background: var(--green-dim);
      color: var(--green);
      font-size: 11px;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 10px;
    }

    .member-row {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(44,74,52,0.4);
      cursor: pointer;
      transition: background 0.15s;
      gap: 12px;
    }
    .member-row:last-child { border-bottom: none; }
    .member-row:active { background: rgba(255,255,255,0.04); }

    .member-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .member-avatar.hadir {
      border-color: var(--green);
      color: var(--green);
      background: rgba(76,175,114,0.1);
    }

    .member-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }

    .check-box {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .check-box.checked {
      border-color: var(--green);
      background: var(--green);
    }
    .check-box svg { display: none; }
    .check-box.checked svg { display: block; }

    /* ── KALENDER ── */
    .calendar-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-header h3 { font-size: 15px; font-weight: 700; color: var(--text); }
    .cal-nav-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 14px;
      width: 32px; height: 32px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-day-name {
      text-align: center;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 4px 0 6px;
      letter-spacing: 0.04em;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      border-radius: 7px;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .cal-day:empty { cursor: default; }
    .cal-day.ronda {
      background: rgba(76,175,114,0.12);
      color: var(--text);
    }
    .cal-day.ronda::after {
      content: '';
      width: 4px; height: 4px;
      background: var(--green);
      border-radius: 50%;
      position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    }
    .cal-day.today {
      background: var(--amber);
      color: var(--bg);
      font-weight: 700;
    }
    .cal-day.today.ronda::after { background: var(--bg); }
    .cal-day:not(:empty):hover { background: rgba(255,255,255,0.06); }
    .cal-day.other-month { color: var(--text-muted); opacity: 0.4; }

    .cal-legend {
      display: flex; gap: 16px; margin-top: 12px;
    }
    .cal-legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-muted);
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* ── JADWAL LIST ── */
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
      margin-top: 4px;
    }

    .jadwal-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .jadwal-item.is-today { border-color: var(--amber); background: rgba(232,162,58,0.06); }
    .jadwal-item.is-next { border-color: var(--green-dim); }

    .jadwal-date-box {
      text-align: center;
      min-width: 44px;
    }
    .jadwal-day { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; }
    .jadwal-month { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .jadwal-info { flex: 1; }
    .jadwal-group { font-size: 14px; font-weight: 700; color: var(--text); }
    .jadwal-members { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .jadwal-badge {
      font-size: 10px;
      font-weight: 700;
      border-radius: 20px;
      padding: 3px 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-today { background: rgba(232,162,58,0.15); color: var(--amber); }
    .badge-next  { background: rgba(76,175,114,0.12); color: var(--green); }
    .badge-done  { background: rgba(74,110,85,0.15); color: var(--text-muted); }

    /* ── GRUP DETAIL ── */
    .group-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .group-tabs::-webkit-scrollbar { display: none; }
    .group-tab {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .group-tab.active {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    .group-detail-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .group-detail-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(42,102,66,0.25) 0%, transparent 100%);
    }
    .group-detail-header h3 { font-size: 16px; font-weight: 700; color: var(--text); }
    .group-detail-header p  { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    .group-member-list .member-row { padding: 11px 16px; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(13,27,18,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px 12px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 0.04em;
      transition: color 0.15s;
      gap: 4px;
    }
    .nav-btn.active { color: var(--green); }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-btn.active svg { stroke: var(--green); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%; transform: translateX(-50%);
      background: var(--card2);
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-size: 13px;
      font-weight: 600;
      border-radius: 24px;
      padding: 9px 20px;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── SUMMARY PILLS ── */
    .summary-row {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .sum-pill {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 10px;
      text-align: center;
    }
    .sum-pill-val  { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1; }
    .sum-pill-val.green { color: var(--green); }
    .sum-pill-val.amber { color: var(--amber); }
    .sum-pill-lbl  { font-size: 10px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }

    hr.divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 14px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="moon-wrap"></div>
  <div class="header-text">
    <h1>Ronda Gang Lilly</h1>
    <p>Siskamling Warga</p>
  </div>
  <div class="clock">
    <div class="clock-time" id="clockTime">00:00</div>
    <div class="clock-date" id="clockDate">-</div>
  </div>
</div>

<!-- SCREEN: BERANDA -->
<div class="screen active" id="screen-beranda">

  <div class="today-banner">
    <div class="today-label">🌙 Malam Ini</div>
    <div class="today-group" id="todayGroupBanner">Grup <span id="todayGroupNum">3</span></div>
    <div class="today-meta">
      <span><i>⏰</i> 23.30 – 04.00</span>
      <span><i>📅</i> Sabtu, <span id="todayDateShort"></span></span>
    </div>
  </div>

  <div class="summary-row">
    <div class="sum-pill">
      <div class="sum-pill-val amber" id="sumHadir">0</div>
      <div class="sum-pill-lbl">Hadir</div>
    </div>
    <div class="sum-pill">
      <div class="sum-pill-val" id="sumTotal">0</div>
      <div class="sum-pill-lbl">Anggota</div>
    </div>
    <div class="sum-pill">
      <div class="sum-pill-val green" id="sumPct">0%</div>
      <div class="sum-pill-lbl">Kehadiran</div>
    </div>
  </div>

  <div class="jam-card">
    <h3>🕐 Jam Ronda Malam Ini</h3>
    <div class="jam-slots" id="jamSlots"></div>
  </div>

  <div class="member-card" id="todayMemberCard">
    <div class="member-card-header">
      <h3 id="todayMemberTitle">Anggota Grup 3</h3>
      <div class="hadir-count" id="hadirCount">0/0 hadir</div>
    </div>
    <div id="todayMemberList"></div>
  </div>

</div>

<!-- SCREEN: JADWAL -->
<div class="screen" id="screen-jadwal">

  <div class="calendar-wrap">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
      <h3 id="calMonthLabel"></h3>
      <button class="cal-nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-legend">
      <div class="cal-legend-item">
        <div class="legend-dot" style="background:var(--amber)"></div> Hari Ini
      </div>
      <div class="cal-legend-item">
        <div class="legend-dot" style="background:var(--green)"></div> Jadwal Ronda
      </div>
    </div>
  </div>

  <div class="section-label">Jadwal Mendatang</div>
  <div id="jadwalList"></div>

</div>

<!-- SCREEN: GRUP -->
<div class="screen" id="screen-grup">

  <div class="group-tabs" id="groupTabs"></div>
  <div id="groupDetailArea"></div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-beranda" onclick="showScreen('beranda')">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9,21 9,12 15,12 15,21"/></svg>
    Beranda
  </button>
  <button class="nav-btn" id="nav-jadwal" onclick="showScreen('jadwal')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Jadwal
  </button>
  <button class="nav-btn" id="nav-grup" onclick="showScreen('grup')">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="3"/><path d="M3 20v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><circle cx="18" cy="7" r="2"/><path d="M22 20v-1a3 3 0 00-3-3h-1"/></svg>
    Grup
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────
const GROUPS = {
  1: { name: "Grup 1", members: ["Idnu","Iwan","Ponijan","Heri","Pendoy"] },
  2: { name: "Grup 2", members: ["Igo","Haris","Andi","Robi","Juna"] },
  3: { name: "Grup 3", members: ["Nono","Frans","Mulyadi","Herman","Pak Budi"] },
  4: { name: "Grup 4", members: ["Rosidin","Jahar","Anggun","Bekti","Aji","Asep"] },
};

const JAM_SLOTS = [
  { label:"Mulai",    time:"23.30" },
  { label:"Giliran 1",time:"01.00" },
  { label:"Giliran 2",time:"02.30" },
  { label:"Selesai",  time:"04.00" },
];

// rotation: week 0 → group 3, week 1 → group 4, week 2 → group 1, week 3 → group 2 ...
// tonight is June 21 2026 (Saturday) = Group 3 as stated
// We find this Saturday and rotate accordingly
function getSaturdayGroup(satDate) {
  // Reference: 2026-06-21 = Group 3
  const ref = new Date(2026, 5, 21); // June 21 2026
  const diff = Math.round((satDate - ref) / (7 * 24 * 3600 * 1000));
  // Groups rotate: 3→4→1→2→3→...
  const order = [3,4,1,2];
  const idx = ((diff % 4) + 4) % 4;
  return order[idx];
}

function getAllSaturdaysInMonth(year, month) {
  const sats = [];
  let d = new Date(year, month, 1);
  while (d.getDay() !== 6) d.setDate(d.getDate() + 1);
  while (d.getMonth() === month) {
    sats.push(new Date(d));
    d.setDate(d.getDate() + 7);
  }
  return sats;
}

// ─── STATE ──────────────────────────────────────────────────
const today = new Date(); // June 20 2026 (Friday night, next ronda is Sat June 21)
// For display purposes the "tonight" ronda is Saturday June 21
const rondaTonight = new Date(2026, 5, 21);

const state = {
  screen: 'beranda',
  calYear: rondaTonight.getFullYear(),
  calMonth: rondaTonight.getMonth(),
  activeGroup: 1,
  attendance: JSON.parse(localStorage.getItem('ronda_attendance') || '{}'),
};

function saveAttendance() {
  localStorage.setItem('ronda_attendance', JSON.stringify(state.attendance));
}

function todayKey() {
  return rondaTonight.toISOString().slice(0,10);
}

function getAttendanceKey(groupId, name) {
  return `${todayKey()}_g${groupId}_${name}`;
}

// ─── CLOCK ──────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  document.getElementById('clockTime').textContent =
    n.getHours().toString().padStart(2,'0') + ':' +
    n.getMinutes().toString().padStart(2,'0');
  const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const mons = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  document.getElementById('clockDate').textContent =
    `${days[n.getDay()]}, ${n.getDate()} ${mons[n.getMonth()]}`;
}
setInterval(updateClock, 1000);
updateClock();

// ─── SCREENS ────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  state.screen = name;
  if (name === 'jadwal') renderJadwal();
  if (name === 'grup')   renderGrup();
}

// ─── BERANDA ────────────────────────────────────────────────
const todayGroupId = getSaturdayGroup(rondaTonight);
const todayGroup = GROUPS[todayGroupId];

function renderBeranda() {
  // date label
  const mons = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  document.getElementById('todayDateShort').textContent =
    `${rondaTonight.getDate()} ${mons[rondaTonight.getMonth()]}`;
  document.getElementById('todayGroupNum').textContent = todayGroupId;
  document.getElementById('todayMemberTitle').textContent = `Anggota ${todayGroup.name}`;

  // jam slots
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const slotHtml = JAM_SLOTS.map(s => {
    const [sh,sm] = s.time.replace('.',':').split(':').map(Number);
    const isNow = (h === sh && Math.abs(m - sm) < 45);
    return `<div class="jam-slot ${isNow ? 'active-now' : ''}">
      <div class="jam-time">${s.time}</div>
      <div class="jam-label">${s.label}</div>
    </div>`;
  }).join('');
  document.getElementById('jamSlots').innerHTML = slotHtml;

  renderTodayMembers();
}

function renderTodayMembers() {
  const members = todayGroup.members;
  let hadirCount = 0;
  const html = members.map(name => {
    const key = getAttendanceKey(todayGroupId, name);
    const isHadir = !!state.attendance[key];
    if (isHadir) hadirCount++;
    const init = name.charAt(0).toUpperCase();
    return `<div class="member-row" onclick="toggleAttendance(${todayGroupId},'${name}')">
      <div class="member-avatar ${isHadir ? 'hadir' : ''}">${init}</div>
      <div class="member-name">${name}</div>
      <div class="check-box ${isHadir ? 'checked' : ''}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>`;
  }).join('');
  document.getElementById('todayMemberList').innerHTML = html;
  document.getElementById('hadirCount').textContent = `${hadirCount}/${members.length} hadir`;

  // summary pills
  document.getElementById('sumHadir').textContent = hadirCount;
  document.getElementById('sumTotal').textContent = members.length;
  document.getElementById('sumPct').textContent =
    Math.round((hadirCount / members.length) * 100) + '%';
}

function toggleAttendance(groupId, name) {
  const key = getAttendanceKey(groupId, name);
  const wasHadir = !!state.attendance[key];
  if (wasHadir) {
    delete state.attendance[key];
    showToast(`${name} — tidak hadir`);
  } else {
    state.attendance[key] = true;
    showToast(`✓ ${name} hadir!`);
  }
  saveAttendance();
  renderTodayMembers();
}

// ─── JADWAL ─────────────────────────────────────────────────
let calYear  = rondaTonight.getFullYear();
let calMonth = rondaTonight.getMonth();

function prevMonth() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderJadwal(); }
function nextMonth() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderJadwal(); }

function renderJadwal() {
  const mons = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  document.getElementById('calMonthLabel').textContent = `${mons[calMonth]} ${calYear}`;

  const sats = getAllSaturdaysInMonth(calYear, calMonth);
  const satSet = new Set(sats.map(d => d.getDate()));

  // build calendar
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = days.map(d => `<div class="cal-day-name">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = (d === rondaTonight.getDate() && calMonth === rondaTonight.getMonth() && calYear === rondaTonight.getFullYear());
    const isRonda = satSet.has(d);
    html += `<div class="cal-day ${isToday?'today':''} ${isRonda?'ronda':''}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  // upcoming list
  const upcoming = [];
  for (let mo = calMonth; mo <= calMonth + 2; mo++) {
    const y = calYear + Math.floor(mo / 12);
    const m = mo % 12;
    getAllSaturdaysInMonth(y, m).forEach(sat => {
      upcoming.push({ date: sat, group: getSaturdayGroup(sat) });
    });
  }
  // sort and show next 8
  upcoming.sort((a,b) => a.date - b.date);
  const shown = upcoming.slice(0, 8);

  const shortMon = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  const listHtml = shown.map(item => {
    const g = GROUPS[item.group];
    const isTonight = item.date.toDateString() === rondaTonight.toDateString();
    const isPast = item.date < today && !isTonight;
    const isNext = !isTonight && item.date > today && item.date < new Date(today.getTime() + 14*24*3600*1000);
    let badge = '';
    if (isTonight) badge = `<span class="jadwal-badge badge-today">Malam Ini</span>`;
    else if (isPast) badge = `<span class="jadwal-badge badge-done">Selesai</span>`;
    else if (isNext) badge = `<span class="jadwal-badge badge-next">Berikutnya</span>`;

    return `<div class="jadwal-item ${isTonight?'is-today':''} ${isNext?'is-next':''}">
      <div class="jadwal-date-box">
        <div class="jadwal-day">${item.date.getDate()}</div>
        <div class="jadwal-month">${shortMon[item.date.getMonth()]}</div>
      </div>
      <div class="jadwal-info">
        <div class="jadwal-group">${g.name}</div>
        <div class="jadwal-members">${g.members.join(', ')}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
  document.getElementById('jadwalList').innerHTML = listHtml;
}

// ─── GRUP ───────────────────────────────────────────────────
function renderGrup() {
  // tabs
  const tabsHtml = Object.keys(GROUPS).map(id => {
    return `<div class="group-tab ${state.activeGroup == id ? 'active' : ''}" onclick="selectGroup(${id})">
      Grup ${id}
    </div>`;
  }).join('');
  document.getElementById('groupTabs').innerHTML = tabsHtml;

  // detail
  const id = state.activeGroup;
  const g = GROUPS[id];
  const nextSat = getNextSaturdayForGroup(id);
  const shortMon = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  const nextLabel = nextSat
    ? `Jadwal ronda: Sabtu ${nextSat.getDate()} ${shortMon[nextSat.getMonth()]} ${nextSat.getFullYear()}`
    : 'Tidak ada jadwal mendatang';

  const membersHtml = g.members.map(name => {
    const key = getAttendanceKey(id, name);
    const isHadir = !!state.attendance[key];
    const isTodayGroup = (id == todayGroupId);
    const init = name.charAt(0).toUpperCase();
    if (isTodayGroup) {
      return `<div class="member-row" onclick="toggleAttendance(${id},'${name}')">
        <div class="member-avatar ${isHadir ? 'hadir' : ''}">${init}</div>
        <div class="member-name">${name}</div>
        <div class="check-box ${isHadir ? 'checked' : ''}">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>`;
    } else {
      return `<div class="member-row">
        <div class="member-avatar">${init}</div>
        <div class="member-name">${name}</div>
      </div>`;
    }
  }).join('');

  const isTonight = (id == todayGroupId);

  document.getElementById('groupDetailArea').innerHTML = `
    <div class="group-detail-card">
      <div class="group-detail-header">
        <h3>${g.name}${isTonight ? ' 🌙' : ''}</h3>
        <p>${nextLabel}${isTonight ? ' — Malam ini!' : ''}</p>
      </div>
      <div class="group-member-list">
        ${membersHtml}
      </div>
    </div>
    ${isTonight ? `<div style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:4px">
      Tap nama untuk menandai kehadiran malam ini
    </div>` : ''}
  `;
}

function selectGroup(id) {
  state.activeGroup = id;
  renderGrup();
}

function getNextSaturdayForGroup(groupId) {
  let d = new Date(rondaTonight);
  for (let i = 0; i < 52; i++) {
    if (getSaturdayGroup(d) === parseInt(groupId)) return d;
    d = new Date(d.getTime() + 7*24*3600*1000);
  }
  return null;
}

// ─── TOAST ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── INIT ───────────────────────────────────────────────────
renderBeranda();
</script>
</body>
</html>
